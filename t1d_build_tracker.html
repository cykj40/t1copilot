  function badgeClass(s) {
    if (s === "done") return "badge badge-done";
    if (s === "inprogress") return "badge badge-inprogress";
    if (s === "blocked") return "badge badge-blocked";
    return "badge badge-todo";
  }
  function badgeLabel(s) {
    if (s === "done") return "Done";
    if (s === "inprogress") return "In progress";
    if (s === "blocked") return "Blocked";
    return "To do";
  }

  const state = { expanded: {} };

  function render() {
    const el = document.getElementById("priorities");
    el.innerHTML = "";
    PRIORITIES.forEach((p) => {
      const open = !!state.expanded[p.id];
      const div = document.createElement("div");
      div.className = "priority";
      div.innerHTML = `
      <div class="p-header" data-id="${p.id}">
        <span class="p-num">P${p.id}</span>
        <span class="p-title">${p.title}</span>
        <span class="${badgeClass(p.status)}">${badgeLabel(p.status)}</span>
        <span class="chevron ${open ? "open" : ""}">▾</span>
      </div>
      ${
        open
          ? `<div class="p-body">
        <div class="subtasks">${p.subtasks
          .map(
            (s) => `
          <div class="subtask ${s.done ? "done" : ""}">
            <div class="chk ${s.done ? "done" : ""}"></div>
            <span>${s.text}</span>
          </div>`,
          )
          .join("")}
        </div>
        ${p.notes ? `<div class="notes">${p.notes}</div>` : ""}
      </div>`
          : ""
      }
    `;
      div.querySelector(".p-header").addEventListener("click", () => {
        state.expanded[p.id] = !state.expanded[p.id];
        render();
      });
      el.appendChild(div);
    });
    const done = PRIORITIES.filter((p) => p.status === "done").length;
    const ip = PRIORITIES.filter((p) => p.status === "inprogress").length;
    const todo = PRIORITIES.filter(
      (p) => p.status === "todo" || p.status === "blocked",
    ).length;
    const total = PRIORITIES.length;
    const pct = Math.round((done / total) * 100);
    document.getElementById("s-done").textContent = done;
    document.getElementById("s-ip").textContent = ip;
    document.getElementById("s-todo").textContent = todo;
    document.getElementById("s-total").textContent = total;
    document.getElementById("pct").textContent = `${pct}%`;
    document.getElementById("pfill").style.width = `${pct}%`;

    const sl = document.getElementById("session-log");
    sl.innerHTML = SESSIONS.map(
      (s) => `
    <div class="session">
      <div class="session-date">${s.date}</div>
      <div class="session-text">${s.text}</div>
    </div>`,
    ).join("");
  }

  state.expanded[10] = true;
  render();
</script>
